<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B+D Archiv</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="B+D Archiv">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
<style>
:root{
  --navy:#1B2F6E;--blue:#3B82F6;--blue-glow:rgba(59,130,246,.45);
  --green:#22C55E;--red:#EF4444;--amber:#F59E0B;
  --glass:rgba(255,255,255,.06);--glass-brd:rgba(255,255,255,.14);
  --text:#F5F7FF;--muted:#A9B4D6;--hint:#7886B8;
  --radius:16px;--radius-sm:10px;
  --font:'Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif;
  --border:var(--glass-brd);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;
  background:radial-gradient(circle at 15% 0%,rgba(59,130,246,.25),transparent 40%),
    radial-gradient(circle at 85% 30%,rgba(99,102,241,.18),transparent 45%),
    linear-gradient(155deg,#0B1430 0%,#16235A 45%,#0E1A45 100%);
  background-attachment:fixed;
}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2rem;border-bottom:1px solid var(--glass-brd);
  background:rgba(10,18,46,.4);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:20;
}
.header-title{font-size:20px;font-weight:800;color:#fff;}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.back-btn{background:rgba(255,255,255,.08);border:1px solid var(--glass-brd);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font);text-decoration:none;}
.back-btn:hover{color:#fff;}
.main{padding:1.5rem 2rem;max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;}
.card{background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius);padding:1.5rem;backdrop-filter:blur(14px);box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.06);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tabs{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:12px;padding:4px;}
.tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;border:none;background:transparent;font-family:var(--font);}
.tab.active{background:rgba(59,130,246,.25);color:#fff;box-shadow:0 0 12px var(--blue-glow);}

/* UPLOAD ZONE */
.upload-zone{
  border:2px dashed var(--glass-brd);border-radius:var(--radius);
  padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;
  background:rgba(255,255,255,.02);position:relative;
}
.upload-zone:hover,.upload-zone.drag-over{border-color:rgba(96,165,250,.7);background:rgba(59,130,246,.08);}
.upload-zone-icon{font-size:48px;margin-bottom:12px;}
.upload-zone-text{font-size:16px;font-weight:600;color:var(--muted);}
.upload-zone-sub{font-size:12px;color:var(--hint);margin-top:6px;}
.camera-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.camera-btn{padding:11px;border:1px dashed var(--border);border-radius:10px;background:rgba(255,255,255,.03);color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.camera-btn:hover{border-color:rgba(96,165,250,.4);color:#fff;}

/* ANALYSE */
.analyse-card{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(99,102,241,.08));border:1px solid rgba(96,165,250,.3);border-radius:var(--radius);padding:1.5rem;display:none;}
.analyse-loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.preview-img{max-width:100%;max-height:200px;border-radius:10px;border:1px solid var(--glass-brd);margin-bottom:1rem;}
.preview-pdf{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid var(--glass-brd);margin-bottom:1rem;}

/* FORM */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;font-size:14px;outline:none;font-family:var(--font);}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.field select option{background:#1B2F6E;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}

/* AUTOCOMPLETE */
.autocomplete-wrap{position:relative;}
.autocomplete-results{
  position:absolute;top:100%;left:0;right:0;z-index:50;
  background:linear-gradient(160deg,rgba(20,35,85,.98),rgba(10,20,60,.99));
  border:1px solid var(--glass-brd);border-radius:10px;margin-top:3px;
  max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.autocomplete-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06);}
.autocomplete-item:hover{background:rgba(59,130,246,.15);}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item-name{font-weight:600;color:#fff;}
.autocomplete-item-sub{font-size:11px;color:var(--hint);margin-top:1px;}

/* ORDNER BADGE */
.ordner-vorschlag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;}
.ordner-badge-angebote{background:rgba(59,130,246,.2);border:1px solid rgba(96,165,250,.4);color:#93c5fd;}
.ordner-badge-auftragsbestaetigung{background:rgba(99,102,241,.2);border:1px solid rgba(139,92,246,.4);color:#c4b5fd;}
.ordner-badge-lieferscheine{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.ordner-badge-rechnungen-debi{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fcd34d;}
.ordner-badge-rechnungen-kredi{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.ordner-badge-ab-lieferanten{background:rgba(107,114,128,.2);border:1px solid rgba(107,114,128,.4);color:#d1d5db;}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:rgba(255,255,255,.07);border:1px solid var(--glass-brd);border-radius:var(--radius-sm);padding:11px 20px;font-size:14px;color:var(--muted);cursor:pointer;font-family:var(--font);}
.btn-secondary:hover{color:#fff;}
.btn-sm{background:rgba(255,255,255,.07);border:1px solid var(--glass-brd);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--font);}
.btn-sm:hover{color:#fff;}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5;}

/* STATUS */
.status-msg{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);}
.status-ok{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.status-err{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}

/* DATEI LISTE */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filter-bar select,.filter-bar input{padding:9px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.07);color:var(--text);font-size:13px;outline:none;font-family:var(--font);}
.filter-bar select option{background:#1B2F6E;}
.datei-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:1rem;}
.datei-card{background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;transition:all .18s;}
.datei-card:hover{background:rgba(255,255,255,.07);border-color:rgba(96,165,250,.3);}
.datei-name{font-size:13px;font-weight:600;color:#fff;word-break:break-all;line-height:1.4;}
.datei-meta{font-size:11px;color:var(--hint);}
.datei-actions{display:flex;gap:6px;flex-wrap:wrap;}
.empty{text-align:center;padding:3rem 1rem;color:var(--hint);font-size:13px;}
.empty-icon{font-size:40px;margin-bottom:8px;}

/* PROGRESS */
.progress-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#6366f1);border-radius:3px;transition:width .3s;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,10,28,.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:linear-gradient(160deg,rgba(30,45,95,.97),rgba(15,25,65,.99));border:1px solid var(--glass-brd);border-radius:var(--radius);padding:1.75rem;width:520px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal h3{font-size:18px;font-weight:800;color:#fff;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:10px;margin-top:1.25rem;justify-content:flex-end;}

@media(max-width:768px){.main{padding:1rem;}.header{padding:.75rem 1rem;}}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="back-btn">← Dashboard</a>
    <div>
      <div class="header-title">🗂 B+D Archiv</div>
      <div class="header-sub">Intelligente Dokumentenverwaltung</div>
    </div>
  </div>
</div>

<main class="main">

  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('upload')">📤 Hochladen</button>
      <button class="tab" onclick="switchTab('archiv')">📁 Archiv</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="doBackup()" id="backupBtn"
        style="background:linear-gradient(135deg,rgba(34,197,94,.25),rgba(16,185,129,.15));border:1px solid rgba(34,197,94,.4);border-radius:var(--radius-sm);padding:9px 18px;font-size:13px;font-weight:700;color:#86efac;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px;">
        💾 Backup erstellen
      </button>
      <div id="globalStatus"></div>
    </div>
  </div>

  <!-- TAB: UPLOAD + CLAUDE ANALYSE -->
  <div id="tab-upload">

    <!-- DROPZONE -->
    <div class="card">
      <div class="upload-zone" id="uploadZone"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleDrop(event)"
        onclick="document.getElementById('fileInput').click()">
        <div class="upload-zone-icon">🤖</div>
        <div class="upload-zone-text">Datei hierher ziehen oder klicken</div>
        <div class="upload-zone-sub">Claude analysiert automatisch: Ordner, Kunde, Metadaten</div>
      </div>
      <div class="camera-btns">
        <div class="camera-btn" onclick="document.getElementById('cameraInput').click()">📷 Kamera</div>
        <div class="camera-btn" onclick="document.getElementById('galleryInput').click()">🖼 Galerie</div>
      </div>
      <input type="file" id="fileInput" style="display:none" onchange="handleFiles(this.files)">
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
      <input type="file" id="galleryInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    </div>

    <!-- ANALYSE RESULT -->
    <div class="analyse-card" id="analyseCard">
      <div class="analyse-loading" id="analyseLoading">
        <div class="spinner"></div>
        <span>Claude analysiert die Datei...</span>
      </div>

      <div id="analyseResult" style="display:none;">
        <!-- Vorschau -->
        <div id="filePreview"></div>

        <!-- Ordner Vorschlag -->
        <div style="margin-bottom:1rem;">
          <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Claude empfiehlt</div>
          <div id="ordnerVorschlag"></div>
        </div>

        <!-- FELDER -->
        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Ordner *</label>
            <select id="fOrdner">
              <option value="angebote">📄 Angebote</option>
              <option value="auftragsbestaetigung">📋 Auftragsbestätigungen</option>
              <option value="lieferscheine">🚛 Lieferscheine signiert</option>
              <option value="rechnungen-debi">🧾 Rechnungen Debi</option>
              <option value="rechnungen-kredi">🧾 Rechnungen Kredi</option>
              <option value="ab-lieferanten">📦 AB Lieferanten</option>
            </select>
          </div>
          <div class="field">
            <label>Dateiname *</label>
            <input id="fName" type="text" placeholder="z.B. Rechnung_Lieferant.pdf">
          </div>
        </div>

        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Jahr *</label>
            <select id="fJahr">
              <option value="2026">2026</option>
              <option value="2027">2027</option>
              <option value="2028">2028</option>
            </select>
          </div>
          <div class="field">
            <label>Monat *</label>
            <select id="fMonat">
              <option value="01">Januar</option>
              <option value="02">Februar</option>
              <option value="03">März</option>
              <option value="04">April</option>
              <option value="05">Mai</option>
              <option value="06">Juni</option>
              <option value="07">Juli</option>
              <option value="08">August</option>
              <option value="09">September</option>
              <option value="10">Oktober</option>
              <option value="11">November</option>
              <option value="12">Dezember</option>
            </select>
          </div>
        </div>

        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Kunde / Lieferant</label>
            <div class="autocomplete-wrap">
              <input id="fKundeSearch" type="text" placeholder="Name oder Nr. suchen..." oninput="searchKunde(this.value)" autocomplete="off">
              <div class="autocomplete-results" id="kundeResults"></div>
            </div>
            <input type="hidden" id="fKundeNr">
          </div>
          <div class="field">
            <label>Datum</label>
            <input id="fDatum" type="date">
          </div>
        </div>

        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Betrag CHF</label>
            <input id="fBetrag" type="number" step="0.01" placeholder="0.00">
          </div>
          <div class="field">
            <label>Referenz / Nr.</label>
            <input id="fReferenz" type="text" placeholder="z.B. Rechnungsnummer">
          </div>
        </div>

        <textarea id="fBeschreibung" style="display:none;"></textarea>

        <div id="uploadActionStatus" style="display:none;" class="status-msg" style="margin-bottom:1rem;"></div>
        <div id="uploadProgress" style="display:none;margin-bottom:1rem;">
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <div style="font-size:12px;color:var(--hint);margin-top:4px;" id="progressText">Hochladen...</div>
        </div>

        <div style="display:flex;gap:10px;">
          <button class="btn-primary" onclick="doUpload()">📤 Jetzt hochladen & archivieren</button>
          <button class="btn-secondary" onclick="resetUpload()">✕ Abbrechen</button>
        </div>
      </div>
    </div>

  </div>

  <!-- TAB: ARCHIV -->
  <div id="tab-archiv" style="display:none;">

    <!-- JAHRES/MONATS ÜBERSICHT -->
    <div class="card" id="monatsUebersichtCard">
      <div class="card-header">
        <div class="card-title">📅 Jahres- & Monatsübersicht</div>
        <div style="display:flex;gap:8px;">
          <select id="filterJahr" onchange="loadMonatsUebersicht()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.07);color:var(--text);font-size:13px;outline:none;font-family:var(--font);">
            <option value="">Alle Jahre</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
          </select>
        </div>
      </div>
      <div id="monatsUebersicht"></div>
    </div>

    <!-- DATEILISTE (wenn Monat gewählt) -->
    <div class="card" id="dateiListeCard" style="display:none;">
      <div class="card-header">
        <div>
          <div class="card-title" id="dateiListeTitle">Dateien</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="filterSuche" type="text" placeholder="🔍 Suchen..." oninput="renderDateiGrid()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.07);color:var(--text);font-size:13px;outline:none;font-family:var(--font);min-width:180px;">
          <button class="btn-sm" onclick="showMonatsUebersicht()">← Zurück</button>
        </div>
      </div>
      <div id="dateiGrid"></div>
    </div>
  </div>

</main>

<!-- VIEWER MODAL -->
<div class="overlay" id="viewerModal">
  <div class="modal" style="width:900px;max-width:97vw;max-height:96vh;display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h3 id="viewerTitle" style="font-size:15px;word-break:break-all;flex:1;margin:0;padding-right:12px;"></h3>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="downloadCurrentViewer()" class="btn-sm btn-primary" style="color:#93c5fd;border-color:rgba(96,165,250,.4);">⬇ Download</button>
        <button onclick="closeViewer()" class="btn-sm">✕ Schliessen</button>
      </div>
    </div>
    <div id="viewerContent" style="flex:1;min-height:0;background:rgba(0,0,0,.3);border-radius:10px;overflow:auto;display:flex;align-items:center;justify-content:center;"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editModal">
  <div class="modal">
    <h3>Datei bearbeiten</h3>
    <div class="field"><label>Dateiname</label><input id="editName" type="text"></div>
    <div class="field">
      <label>Ordner</label>
      <select id="editOrdner">
        <option value="angebote">📄 Angebote</option>
        <option value="auftragsbestaetigung">📋 Auftragsbestätigungen</option>
        <option value="lieferscheine">🚛 Lieferscheine signiert</option>
        <option value="rechnungen-debi">🧾 Rechnungen Debi</option>
        <option value="rechnungen-kredi">🧾 Rechnungen Kredi</option>
        <option value="ab-lieferanten">📦 AB Lieferanten</option>
      </select>
    </div>
    <div class="field">
      <label>Kunde / Lieferant</label>
      <div class="autocomplete-wrap">
        <input id="editKundeSearch" type="text" placeholder="Name oder Nr. suchen..." oninput="searchKundeEdit(this.value)" autocomplete="off">
        <div class="autocomplete-results" id="editKundeResults"></div>
      </div>
      <input type="hidden" id="editKundeNr">
    </div>
    <div id="editModalStatus" style="display:none;" class="status-msg"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEditModal()">Abbrechen</button>
      <button class="btn-primary" style="padding:10px 22px;font-size:14px;" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

function switchTab(t){
  document.getElementById('tab-upload').style.display=t==='upload'?'':'none';
  document.getElementById('tab-archiv').style.display=t==='archiv'?'':'none';
  document.querySelectorAll('.tab').forEach(function(b,i){ b.classList.toggle('active',(i===0&&t==='upload')||(i===1&&t==='archiv')); });
  if(t==='archiv') loadMonatsUebersicht();

// ── KUNDEN
function loadKunden(){
  fetch(CC_FN+'?action=persons')
    .then(function(r){ return r.json(); })
    .then(function(res){
      allKunden=(res.data||[]).sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','de'); });
    }).catch(function(){});
}

function searchKunde(q, resultsId, hiddenId){
  resultsId=resultsId||'kundeResults'; hiddenId=hiddenId||'fKundeNr';
  var el=document.getElementById(resultsId);
  if(!q||q.length<2){ el.style.display='none'; return; }
  var lq=q.toLowerCase();
  var hits=allKunden.filter(function(k){
    var name=k.company||(k.firstName+' '+k.lastName).trim()||k.name;
    return (name+String(k.nr||'')+k.city).toLowerCase().includes(lq);
  }).slice(0,8);
  if(!hits.length){ el.style.display='none'; return; }
  el.innerHTML=hits.map(function(k){
    var name=k.company||(k.firstName+' '+k.lastName).trim()||k.name;
    return '<div class="autocomplete-item" onclick="selectKunde(\''+k.nr+'\',\''+name.replace(/'/g,'')+'\',\''+resultsId+'\',\''+hiddenId+'\')">'
      +'<div class="autocomplete-item-name">'+name+'</div>'
      +'<div class="autocomplete-item-sub">Nr. '+k.nr+(k.city?' · '+k.city:'')+'</div>'
    +'</div>';
  }).join('');
  el.style.display='block';
}
function searchKundeEdit(q){ searchKunde(q,'editKundeResults','editKundeNr'); }

function selectKunde(nr, name, resultsId, hiddenId){
  var searchId=resultsId==='kundeResults'?'fKundeSearch':'editKundeSearch';
  document.getElementById(searchId).value=nr+' – '+name;
  document.getElementById(hiddenId).value=nr;
  document.getElementById(resultsId).style.display='none';
}

function analyseFile(file){
  currentFile=file;
  var card=document.getElementById('analyseCard');
  card.style.display='block';
  document.getElementById('analyseLoading').style.display='flex';
  document.getElementById('analyseResult').style.display='none';
  document.getElementById('uploadActionStatus').style.display='none';

  // Vorschau
  var prevEl=document.getElementById('filePreview');
  var ext=file.name.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext)){
    var url=URL.createObjectURL(file);
    prevEl.innerHTML='<img src="'+url+'" class="preview-img">';
  } else {
    var icon=ext==='pdf'?'📄':ext==='xlsx'||ext==='xls'?'📊':ext==='docx'?'📝':'📎';
    prevEl.innerHTML='<div class="preview-pdf"><span style="font-size:32px;">'+icon+'</span><div><div style="font-weight:600;font-size:14px;">'+file.name+'</div><div style="font-size:12px;color:var(--hint);">'+(file.size>1048576?(file.size/1048576).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB')+'</div></div></div>';
  }

  // Vorausfüllen mit Dateiname
  document.getElementById('fName').value=file.name;
  document.getElementById('fDatum').value=new Date().toISOString().split('T')[0];

  // Claude Analyse
  if(['jpg','jpeg','png','gif','webp'].includes(ext)){
    var reader=new FileReader();
    reader.onload=function(e){
      var base64=e.target.result.split(',')[1];
      claudeAnalyse(base64, file.type||'image/jpeg', file.name);
    };
    reader.readAsDataURL(file);
  } else if(ext === 'pdf'){
    // PDF erste Seite → Canvas → JPEG → Claude Vision
    var pdfUrl = URL.createObjectURL(file);
    renderPdfToJpeg(pdfUrl, file.name);
  } else {
    claudeAnalyseText(file.name);
  }
}

function renderPdfToJpeg(pdfUrl, fileName){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf){
    return pdf.getPage(1);
  }).then(function(page){
    var scale = 1.5;
    var viewport = page.getViewport({scale: scale});
    var canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    return page.render({canvasContext: ctx, viewport: viewport}).promise.then(function(){
      var jpegDataUrl = canvas.toDataURL('image/jpeg', 0.85);
      var jpegBase64 = jpegDataUrl.split(',')[1];
      // Vorschau zeigen
      document.getElementById('filePreview').innerHTML = '<img src="'+jpegDataUrl+'" class="preview-img">';
      claudeAnalyse(jpegBase64, 'image/jpeg', fileName);
    });
  }).catch(function(){
    claudeAnalyseText(fileName);
  });
}

function fillAnalyseForm(data){
  if(data.ordner) document.getElementById('fOrdner').value=data.ordner;
  if(data.dateiname) document.getElementById('fName').value=data.dateiname;
  if(data.betrag) document.getElementById('fBetrag').value=data.betrag;
  if(data.referenz) document.getElementById('fReferenz').value=data.referenz;
  if(data.beschreibung) document.getElementById('fBeschreibung').value=data.beschreibung;

  // Jahr/Monat aus Upload-Datum (immer heute)
  var heute = new Date();
  document.getElementById('fJahr').value = String(heute.getFullYear());
  document.getElementById('fMonat').value = String(heute.getMonth()+1).padStart(2,'0');
  document.getElementById('fDatum').value = heute.toISOString().split('T')[0];

  // Kundennummer direkt aus Claude übernehmen falls vorhanden
  if(data.kunde_nr && data.kunde_nr.trim()){
    var k = allKunden.find(function(x){ return String(x.nr) === String(data.kunde_nr).trim(); });
    if(k){
      var kname = k.company||(k.firstName+' '+k.lastName).trim()||k.name;
      document.getElementById('fKundeSearch').value = k.nr+' – '+kname;
      document.getElementById('fKundeNr').value = k.nr;
      // Dateiname mit Kundennummer prefixen falls noch nicht
      var fn = document.getElementById('fName').value;
      if(fn && !fn.startsWith(k.nr+'_')) document.getElementById('fName').value = k.nr+'_'+fn;
      showAnalyseResult();
      return;
    }
  }

  // Fallback: Fuzzy-Suche nach Namen
  if(data.kunde_lieferant && data.kunde_lieferant.trim()){
    var searchTerm = data.kunde_lieferant.trim();
    document.getElementById('fKundeSearch').value = searchTerm;
    function normalize(s){ return s.toLowerCase().replace(/\s+ag$|\s+gmbh$|\s+sarl$|\s+sa$|\s+kg$|\s+ltd$/,'').replace(/[^a-z0-9äöüß]/g,' ').trim(); }
    var lq = normalize(searchTerm);
    var words = lq.split(' ').filter(function(w){ return w.length > 2; });
    var hit = allKunden.find(function(k){
      var name = k.company||(k.firstName+' '+k.lastName).trim()||k.name;
      var kn = normalize(name);
      if(kn === lq) return true;
      return words.length > 0 && words.every(function(w){ return kn.includes(w); });
    });
    if(hit){
      var name = hit.company||(hit.firstName+' '+hit.lastName).trim()||hit.name;
      document.getElementById('fKundeSearch').value = hit.nr+' – '+name;
      document.getElementById('fKundeNr').value = hit.nr;
      var fn2 = document.getElementById('fName').value;
      if(fn2 && !fn2.startsWith(hit.nr+'_')) document.getElementById('fName').value = hit.nr+'_'+fn2;
    } else {
      searchKunde(searchTerm);
    }
  }

  // Ordner Badge
  var ordner=data.ordner||'angebote';
  var grund=data.ordner_grund||'';
  var badgeClass=ORDNER_BADGE_CLASS[ordner]||'ordner-badge-angebote';
  document.getElementById('ordnerVorschlag').innerHTML=
    '<div class="ordner-vorschlag '+badgeClass+'">'+ORDNER_LABELS[ordner]+'</div>'
    +(grund?'<div style="font-size:12px;color:var(--hint);">'+grund+'</div>':'');

  showAnalyseResult();
}

  document.getElementById('analyseLoading').style.display='none';
  document.getElementById('analyseResult').style.display='block';
}

  ['fName','fDatum','fBetrag','fReferenz','fBeschreibung'].forEach(function(id){ document.getElementById(id).value=''; });
  // Jahr/Monat auf heute zurücksetzen
  var heute = new Date();
  document.getElementById('fJahr').value = String(heute.getFullYear());
  document.getElementById('fMonat').value = String(heute.getMonth()+1).padStart(2,'0');

// ── UPLOAD
function doUpload(){
  if(!currentFile){ alert('Keine Datei ausgewählt.'); return; }
  var ordner = document.getElementById('fOrdner').value;
  var name = document.getElementById('fName').value.trim();
  var kundeNr = document.getElementById('fKundeNr').value.trim();
  var jahr = document.getElementById('fJahr').value;
  var monat = document.getElementById('fMonat').value;
  if(!name){ alert('Bitte einen Dateinamen eingeben.'); return; }

  // Pfad: ordner/jahr/monat/kundennr_dateiname
  var fileName = kundeNr ? kundeNr+'_'+name : name;
  var path = ordner+'/'+jahr+'/'+monat+'/'+fileName;

  var statusEl = document.getElementById('uploadActionStatus');
  var prog = document.getElementById('uploadProgress');
  statusEl.style.display='none';
  prog.style.display='block';
  document.getElementById('progressFill').style.width='30%';
  document.getElementById('progressText').textContent='Wird hochgeladen...';

  fetch(bp(path),{
    method:'POST',
    headers:{...sh(),'Content-Type':currentFile.type||'application/octet-stream','x-upsert':'true'},
    body:currentFile
  })
  .then(function(r){
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('progressText').textContent='Fertig!';
    if(!r.ok) throw new Error('Upload fehlgeschlagen ('+r.status+')');
    return r.json();
  })
  .then(function(){
    prog.style.display='none';
    statusEl.style.display='block';
    statusEl.className='status-msg status-ok';
    var MONATSNAMEN=['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    statusEl.textContent='✅ "'+fileName+'" in '+ORDNER_LABELS[ordner]+' / '+jahr+' / '+MONATSNAMEN[parseInt(monat)]+' archiviert!';
    setTimeout(function(){ resetUpload(); },2500);
  })
  .catch(function(err){
    prog.style.display='none';
    statusEl.style.display='block';
    statusEl.className='status-msg status-err';
    statusEl.textContent='❌ '+err.message;
  });
}

var MONATSNAMEN = ['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var currentMonatPfad = null; // z.B. 'rechnungen-debi/2026/06'

function showMonatsUebersicht(){
  document.getElementById('monatsUebersichtCard').style.display='';
  document.getElementById('dateiListeCard').style.display='none';
  currentMonatPfad = null;
}

function loadMonatsUebersicht(){
  switchTab('archiv');
  var filterJahr = document.getElementById('filterJahr')?.value || '';
  var el = document.getElementById('monatsUebersicht');
  el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Lade Übersicht...</div>';

  var alleOrdner = ['angebote','auftragsbestaetigung','lieferscheine','rechnungen-debi','rechnungen-kredi','ab-lieferanten'];
  var jahre = filterJahr ? [filterJahr] : ['2026','2027','2028'];
  var monateData = {}; // { 'ordner/jahr/monat': anzahl }
  var pending = alleOrdner.length * jahre.length;

  if(pending === 0){ renderMonatsUebersicht(monateData, jahre); return; }

  alleOrdner.forEach(function(ord){
    jahre.forEach(function(jahr){
      fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET),{
        method:'POST',
        headers:{...sh(),'Content-Type':'application/json'},
        body:JSON.stringify({prefix:ord+'/'+jahr+'/',limit:1000})
      })
      .then(function(r){ return r.json(); })
      .then(function(files){
        // Dateien nach Monat gruppieren
        (files||[]).filter(function(f){ return f.name&&f.id; }).forEach(function(f){
          // Pfad: monat/kundennr_datei.pdf → monat ist erster Teil
          var parts = f.name.split('/');
          var monat = parts[0]; // z.B. "06"
          if(/^\d{2}$/.test(monat)){
            var key = ord+'/'+jahr+'/'+monat;
            monateData[key] = (monateData[key]||0)+1;
          }
        });
        pending--;
        if(pending===0) renderMonatsUebersicht(monateData, jahre);
      })
      .catch(function(){ pending--; if(pending===0) renderMonatsUebersicht(monateData, jahre); });
    });
  });
}

function renderMonatsUebersicht(monateData, jahre){
  var el = document.getElementById('monatsUebersicht');
  var ORDNER_LABELS_KURZ = {angebote:'Angebote',auftragsbestaetigung:'Auftragsbestät.',lieferscheine:'Lieferscheine','rechnungen-debi':'Rech. Debi','rechnungen-kredi':'Rech. Kredi','ab-lieferanten':'AB Lieferant'};
  var alleOrdner = ['angebote','auftragsbestaetigung','lieferscheine','rechnungen-debi','rechnungen-kredi','ab-lieferanten'];

  // Nur Jahre mit Daten anzeigen
  var html = '';
  jahre.forEach(function(jahr){
    var hasDaten = Object.keys(monateData).some(function(k){ return k.includes('/'+jahr+'/'); });
    if(!hasDaten && Object.keys(monateData).length>0) return;

    html += '<div style="margin-bottom:1.5rem;">'
      +'<div style="font-size:16px;font-weight:800;color:#fff;padding:8px 0 10px;border-bottom:1px solid var(--glass-brd);margin-bottom:12px;">📅 '+jahr+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;">';

    for(var m=1; m<=12; m++){
      var monat = String(m).padStart(2,'0');
      // Alle Dateien dieses Monats zählen
      var total = 0;
      var ordnerInfo = [];
      alleOrdner.forEach(function(ord){
        var key = ord+'/'+jahr+'/'+monat;
        var count = monateData[key]||0;
        if(count>0){ total+=count; ordnerInfo.push(ORDNER_LABELS_KURZ[ord]+': '+count); }
      });

      html += '<div style="background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);border-radius:12px;padding:14px;">'
        +'<div style="font-size:14px;font-weight:700;color:'+(total>0?'#fff':'var(--hint)')+';">'+MONATSNAMEN[m]+'</div>'
        +(total>0?'<div style="font-size:11px;color:var(--hint);margin-top:2px;">'+ordnerInfo.join(' · ')+'</div>':'<div style="font-size:11px;color:var(--hint);margin-top:2px;">Keine Dateien</div>')
        +'<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">'
          +(total>0?'<button onclick="loadMonat(\''+jahr+'\',\''+monat+'\')" class="btn-sm" style="color:#93c5fd;border-color:rgba(96,165,250,.3);">📂 Anzeigen</button>':'')
          +(total>0?'<button onclick="backupMonat(\''+jahr+'\',\''+monat+'\',this)" class="btn-sm btn-green" style="color:#86efac;border-color:rgba(34,197,94,.4);">💾 Backup</button>':'')
          +(total>0?'<button onclick="deleteMonat(\''+jahr+'\',\''+monat+'\')" class="btn-sm btn-danger">🗑 Löschen</button>':'')
        +'</div>'
      +'</div>';
    }
    html += '</div></div>';
  });

  if(!html) html = '';
  // Button für alte Dateien ohne Jahresstruktur
  html += '<div id="alteDateienBereich" style="display:none;margin-top:1rem;padding:12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;">'
    +'<div><div style="font-size:13px;font-weight:700;color:#fcd34d;">📂 Ältere Dateien</div><div id="alteDateienCount" style="font-size:11px;color:var(--hint);margin-top:2px;"></div></div>'
    +'<button onclick="renderAlteDateien()" class="btn-sm" style="color:#fcd34d;border-color:rgba(245,158,11,.4);">Anzeigen</button>'
  +'</div>';
  el.innerHTML = html;
  loadAlteDateien(); // alte Dateien parallel laden
}

var alteDateien = [];

function loadAlteDateien(){
  var alleOrdner = ['angebote','auftragsbestaetigung','lieferscheine','rechnungen-debi','rechnungen-kredi','ab-lieferanten'];
  alteDateien = [];
  var pending = alleOrdner.length;
  alleOrdner.forEach(function(ord){
    fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET),{
      method:'POST', headers:{...sh(),'Content-Type':'application/json'},
      body:JSON.stringify({prefix:ord+'/',limit:500})
    })
    .then(function(r){ return r.json(); })
    .then(function(files){
      (files||[]).filter(function(f){ return f.name&&f.id; }).forEach(function(f){
        // Nur Dateien direkt im Ordner (kein Jahr-Unterordner)
        if(!f.name.includes('/'))
          alteDateien.push({path:ord+'/'+f.name,folder:ord,rawName:f.name,name:f.name,size:f.metadata?.size||0,created_at:f.created_at});
      });
      pending--;
      if(pending===0 && alteDateien.length>0){
        var el = document.getElementById('alteDateienBereich');
        if(el){ el.style.display='flex'; document.getElementById('alteDateienCount').textContent=alteDateien.length+' Datei(en) ohne Jahres-/Monatsstruktur'; }
      }
    }).catch(function(){ pending--; });
  });
}

function renderAlteDateien(){
  allDateien = alteDateien;
  document.getElementById('monatsUebersichtCard').style.display='none';
  document.getElementById('dateiListeCard').style.display='';
  document.getElementById('dateiListeTitle').textContent='📂 Ältere Dateien (ohne Monatsstruktur)';
  renderDateiGrid();
}

function loadMonat(jahr, monat){
  document.getElementById('monatsUebersichtCard').style.display='none';
  document.getElementById('dateiListeCard').style.display='';
  document.getElementById('dateiListeTitle').textContent = MONATSNAMEN[parseInt(monat)]+' '+jahr;
  var el = document.getElementById('dateiGrid');
  el.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Lade Dateien...</div>';

  var alleOrdner = ['angebote','auftragsbestaetigung','lieferscheine','rechnungen-debi','rechnungen-kredi','ab-lieferanten'];
  var allResults = [];
  var pending = alleOrdner.length;

  alleOrdner.forEach(function(ord){
    fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET),{
      method:'POST',
      headers:{...sh(),'Content-Type':'application/json'},
      body:JSON.stringify({prefix:ord+'/'+jahr+'/'+monat+'/',limit:500,sortBy:{column:'created_at',order:'desc'}})
    })
    .then(function(r){ return r.json(); })
    .then(function(files){
      (files||[]).filter(function(f){ return f.name&&f.id; }).forEach(function(f){
        allResults.push({
          path: ord+'/'+jahr+'/'+monat+'/'+f.name,
          folder: ord, jahr: jahr, monat: monat,
          name: f.name, rawName: f.name,
          size: f.metadata?.size||0, created_at: f.created_at
        });
      });
      pending--;
      if(pending===0){
        allDateien = allResults.sort(function(a,b){ return new Date(b.created_at)-new Date(a.created_at); });
        renderDateiGrid();
      }
    })
    .catch(function(){ pending--; if(pending===0){ allDateien=allResults; renderDateiGrid(); } });
  });
}

async function backupMonat(jahr, monat, btnEl){
  var btn = btnEl || event.currentTarget;
  var origText = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='⏳...'; }
  var zip = new JSZip();
  var MONAT_NAME = MONATSNAMEN[parseInt(monat)];
  var root = zip.folder(jahr+'-'+MONAT_NAME);
  var alleOrdner = ['angebote','auftragsbestaetigung','lieferscheine','rechnungen-debi','rechnungen-kredi','ab-lieferanten'];
  var allFiles = [];

  for(var i=0; i<alleOrdner.length; i++){
    try{
      var r = await fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET),{
        method:'POST', headers:{...sh(),'Content-Type':'application/json'},
        body:JSON.stringify({prefix:alleOrdner[i]+'/'+jahr+'/'+monat+'/',limit:500})
      });
      var files = await r.json();
      (files||[]).filter(function(f){ return f.name&&f.id; }).forEach(function(f){
        allFiles.push({path:alleOrdner[i]+'/'+jahr+'/'+monat+'/'+f.name, ordner:alleOrdner[i], name:f.name});
      });
    }catch(e){}
  }

  if(!allFiles.length){ alert('Keine Dateien in diesem Monat.'); if(btn){ btn.disabled=false; btn.textContent=origText; } return; }

  for(var j=0; j<allFiles.length; j++){
    try{
      var enc = allFiles[j].path.split('/').map(function(p){ return encodeURIComponent(p); }).join('/');
      var res = await fetch(SUPA_ST+'/object/authenticated/'+encodeURIComponent(BUCKET)+'/'+enc,{headers:sh()});
      if(res.ok){
        var buf = await res.arrayBuffer();
        root.file(allFiles[j].ordner+'/'+allFiles[j].name, buf);
      }
    }catch(e){}
    btn.textContent='⏳ '+( j+1)+'/'+allFiles.length;
  }

  var blob = await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='BD_'+jahr+'_'+MONAT_NAME+'.zip'; a.click();
  URL.revokeObjectURL(url);
  if(btn){ btn.disabled=false; btn.textContent=origText; }
}

async function deleteMonat(jahr, monat){
  var MONAT_NAME = MONATSNAMEN[parseInt(monat)];
  var ok = confirm('⚠️ ACHTUNG: Alle Dateien von '+MONAT_NAME+' '+jahr+' werden gelöscht!\n\nBitte erstellen Sie zuerst ein Backup!\n\nTrotzdem löschen?');
  if(!ok) return;
  var ok2 = confirm('Wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.');
  if(!ok2) return;

  var alleOrdner = ['angebote','auftragsbestaetigung','lieferscheine','rechnungen-debi','rechnungen-kredi','ab-lieferanten'];
  var allFiles = [];
  for(var i=0; i<alleOrdner.length; i++){
    try{
      var r = await fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET),{
        method:'POST', headers:{...sh(),'Content-Type':'application/json'},
        body:JSON.stringify({prefix:alleOrdner[i]+'/'+jahr+'/'+monat+'/',limit:500})
      });
      var files = await r.json();
      (files||[]).filter(function(f){ return f.name&&f.id; }).forEach(function(f){
        allFiles.push(alleOrdner[i]+'/'+jahr+'/'+monat+'/'+f.name);
      });
    }catch(e){}
  }

  if(!allFiles.length){ alert('Keine Dateien gefunden.'); return; }

  // Bulk delete
  var res = await fetch(SUPA_ST+'/object/'+encodeURIComponent(BUCKET),{
    method:'DELETE', headers:{...sh(),'Content-Type':'application/json'},
    body:JSON.stringify({prefixes:allFiles})
  });
  if(res.ok){
    alert('✅ '+allFiles.length+' Dateien von '+MONAT_NAME+' '+jahr+' wurden gelöscht.');
    loadMonatsUebersicht();
  } else {
    alert('Fehler beim Löschen.');
  }
}

function loadDateien(){
  loadMonatsUebersicht();
}

function renderDateiGrid(){
  var el=document.getElementById('dateiGrid');
  var q=document.getElementById('filterSuche').value.toLowerCase();
  // Suche auch in Kundennamen
  var list=allDateien.filter(function(f){
    if(!q) return true;
    if(f.rawName.toLowerCase().includes(q)) return true;
    // Kundennummer aus Name
    var parts = f.rawName.split('_');
    if(parts.length > 1 && /^\d+$/.test(parts[0])){
      var k = allKunden.find(function(x){ return String(x.nr) === parts[0]; });
      if(k){
        var kname = k.company||(k.firstName+' '+k.lastName).trim()||k.name;
        if(kname.toLowerCase().includes(q) || parts[0].includes(q)) return true;
      }
    }
    return false;
  });
  if(!list.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Keine Dateien gefunden.</div>'; return; }

  var FICONS={angebote:'📄',auftragsbestaetigung:'📋',lieferscheine:'🚛','rechnungen-debi':'🧾','rechnungen-kredi':'🧾','ab-lieferanten':'📦'};

  // Dateien nach Kundennummer gruppieren
  var gruppen = {};
  list.forEach(function(f){
    var nameParts = f.rawName.split('_');
    var kundeNr = '';
    var kundeLabel = '📂 Kein Kunde';
    if(nameParts.length > 1 && /^\d+$/.test(nameParts[0])){
      kundeNr = nameParts[0];
      var k = allKunden.find(function(x){ return String(x.nr) === kundeNr; });
      // Label: nur Kundenname (nicht doppelte Nummer)
      var kname = k ? (k.company||(k.firstName+' '+k.lastName).trim()||k.name) : '';
      kundeLabel = '👤 '+kundeNr+(kname ? ' – '+kname : '');
    }
    if(!gruppen[kundeNr]) gruppen[kundeNr] = {label: kundeLabel, dateien: []};
    gruppen[kundeNr].dateien.push(f);
  });

  var keys = Object.keys(gruppen).sort(function(a,b){
    if(a===''&&b!=='') return 1;
    if(b===''&&a!=='') return -1;
    return parseInt(a)-parseInt(b);
  });

  el.innerHTML = keys.map(function(key){
    var gruppe = gruppen[key];
    var dateienHtml = gruppe.dateien.map(function(f){
      var ext=(f.name||'').split('.').pop().toLowerCase();
      var icon=ext==='pdf'?'📄':ext==='xlsx'||ext==='xls'?'📊':ext==='docx'?'📝':['jpg','jpeg','png'].includes(ext)?'🖼':'📎';
      var size=f.size?(f.size>1048576?(f.size/1048576).toFixed(1)+'MB':(f.size/1024).toFixed(0)+'KB'):'';
      var date=f.created_at?new Date(f.created_at).toLocaleDateString('de-CH'):'';
      var fi=FICONS[f.folder]||'📁';
      // Dateiname ohne Kundennummer-Prefix anzeigen
      var displayName = f.rawName;
      if(key && displayName.startsWith(key+'_')) displayName = displayName.substring((key+'_').length);
      return '<div class="datei-card">'
        +'<div style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;" onclick="openViewer(\''+f.path+'\',\''+f.rawName+'\')">'
          +'<div style="font-size:26px;flex-shrink:0;">'+icon+'</div>'
          +'<div style="flex:1;min-width:0;">'
            +'<div class="datei-name" title="'+f.rawName+'">'+displayName+'</div>'
            +'<div class="datei-meta">'+fi+' '+(f.folder||'')+(size?' · '+size:'')+(date?' · '+date:'')+'</div>'
          +'</div>'
        +'</div>'
        +'<div class="datei-actions">'
          +'<button class="btn-sm" style="color:#93c5fd;border-color:rgba(96,165,250,.3);" onclick="openViewer(\''+f.path+'\',\''+f.rawName+'\')">👁 Anzeigen</button>'
          +'<button class="btn-sm" onclick="downloadDatei(\''+f.path+'\',\''+f.rawName+'\')">⬇ Download</button>'
          +'<button class="btn-sm" onclick="openEditModal(\''+f.path+'\',\''+f.rawName+'\',\''+f.folder+'\')">✏</button>'
          +'<button class="btn-sm btn-danger" onclick="deleteDatei(\''+f.path+'\')">🗑</button>'
        +'</div>'
      +'</div>';
    }).join('');

    return '<div style="margin-bottom:1.5rem;">'
      +'<div style="font-size:13px;font-weight:700;color:rgba(165,185,230,.9);padding:8px 4px 6px;border-bottom:1px solid var(--glass-brd);margin-bottom:10px;display:flex;align-items:center;gap:6px;">'
        +gruppe.label
        +'<span style="font-size:11px;color:var(--hint);font-weight:400;">('+gruppe.dateien.length+')</span>'
      +'</div>'
      +'<div class="datei-grid">'+dateienHtml+'</div>'
    +'</div>';
  }).join('');
}

var currentViewerPath = null;
var currentViewerName = null;

function openViewer(path, name){
  currentViewerPath = path;
  currentViewerName = name;
  var ext = name.split('.').pop().toLowerCase();
  document.getElementById('viewerTitle').textContent = name;
  var content = document.getElementById('viewerContent');
  content.innerHTML = '<div style="color:var(--muted);font-size:13px;">⏳ Wird geladen...</div>';
  document.getElementById('viewerModal').classList.add('open');

  // Datei via authenticated fetch laden
  var encodedPath = path.split('/').map(function(p){ return encodeURIComponent(p); }).join('/');
  fetch(SUPA_ST+'/object/authenticated/'+encodeURIComponent(BUCKET)+'/'+encodedPath, {
    headers: sh()
  })
  .then(function(r){
    if(!r.ok) throw new Error('Status '+r.status);
    return r.blob();
  })
  .then(function(blob){
    var url = URL.createObjectURL(blob);
    if(ext === 'pdf'){
      content.innerHTML = '<iframe src="'+url+'" style="width:100%;height:70vh;border:none;border-radius:8px;"></iframe>';
    } else if(['jpg','jpeg','png','gif','webp'].includes(ext)){
      content.innerHTML = '<img src="'+url+'" style="max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px;">';
    } else {
      content.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted);">📎 Vorschau nicht verfügbar<br><button onclick="downloadCurrentViewer()" class="btn-sm btn-primary" style="margin-top:1rem;color:#93c5fd;">⬇ Herunterladen</button></div>';
    }
    // Download-Link merken
    content._blobUrl = url;
  })
  .catch(function(err){
    content.innerHTML = '<div style="color:var(--red);font-size:13px;padding:1rem;">Fehler: '+err.message+'</div>';
  });
}

function closeViewer(){
  document.getElementById('viewerModal').classList.remove('open');
  document.getElementById('viewerContent').innerHTML = '';
}

function downloadCurrentViewer(){
  if(!currentViewerPath || !currentViewerName) return;
  downloadDatei(currentViewerPath, currentViewerName);
}

function downloadDatei(path, name){
  var encodedPath = path.split('/').map(function(p){ return encodeURIComponent(p); }).join('/');
  fetch(SUPA_ST+'/object/authenticated/'+encodeURIComponent(BUCKET)+'/'+encodedPath, {
    headers: sh()
  })
  .then(function(r){
    if(!r.ok) throw new Error('Status '+r.status);
    return r.blob();
  })
  .then(function(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  })
  .catch(function(err){ alert('Download Fehler: '+err.message); });
}

function deleteDatei(path){
  if(!confirm('Datei endgültig löschen?')) return;
  fetch(bp(path),{method:'DELETE',headers:sh()})
    .then(function(){ loadDateien(); })
    .catch(function(err){ alert('Fehler: '+err.message); });
}

// ── EDIT MODAL
function openEditModal(path,name,folder){
  currentEditFile={path,name,folder};
  document.getElementById('editName').value=name;
  document.getElementById('editOrdner').value=folder;
  document.getElementById('editKundeSearch').value='';
  document.getElementById('editKundeNr').value='';
  // Kundennummer aus Name extrahieren
  var parts=name.split('_');
  if(parts.length>1&&/^\d+$/.test(parts[0])){
    var k=allKunden.find(function(x){ return String(x.nr)===parts[0]; });
    if(k){
      var kname=k.company||(k.firstName+' '+k.lastName).trim()||k.name;
      document.getElementById('editKundeSearch').value=k.nr+' – '+kname;
      document.getElementById('editKundeNr').value=k.nr;
    }
  }
  document.getElementById('editModalStatus').style.display='none';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){ document.getElementById('editModal').classList.remove('open'); }

function saveEdit(){
  var newName=document.getElementById('editName').value.trim();
  var newFolder=document.getElementById('editOrdner').value;
  var kundeNr=document.getElementById('editKundeNr').value.trim();
  if(!newName){ alert('Bitte einen Namen eingeben.'); return; }

  var fileName=kundeNr?kundeNr+'_'+newName:newName;
  var newPath=newFolder+'/'+fileName;
  var statusEl=document.getElementById('editModalStatus');
  statusEl.style.display='block';
  statusEl.className='status-msg';
  statusEl.style.background='rgba(59,130,246,.12)';
  statusEl.style.color='#93c5fd';
  statusEl.textContent='⏳ Wird verschoben...';

  fetch(SUPA_ST+'/object/move',{
    method:'POST',headers:{...sh(),'Content-Type':'application/json'},
    body:JSON.stringify({bucketId:BUCKET,sourceKey:currentEditFile.path,destinationKey:newPath})
  })
  .then(function(r){ if(!r.ok) throw new Error('Move fehlgeschlagen'); return r.json(); })
  .then(function(){
    statusEl.className='status-msg status-ok';
    statusEl.textContent='✅ Gespeichert!';
    setTimeout(function(){ closeEditModal(); loadDateien(); },1000);
  })
  .catch(function(err){
    statusEl.className='status-msg status-err';
    statusEl.textContent='❌ '+err.message;
  });
}

// ── BACKUP ───────────────────────────────────────────────────────
async function doBackup(){
  var btn = document.getElementById('backupBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Backup läuft...';

  var ORDNER_NAMEN = {
    'angebote': 'Angebote',
    'auftragsbestaetigung': 'Auftragsbestaetigung',
    'lieferscheine': 'Lieferscheine_signiert',
    'rechnungen-debi': 'Rechnungen_Debi',
    'rechnungen-kredi': 'Rechnungen_Kredi',
    'ab-lieferanten': 'AB_Lieferanten'
  };

  try {
    var zip = new JSZip();
    var datum = new Date().toISOString().split('T')[0];
    var rootFolder = zip.folder('BD_Archiv_Backup_'+datum);

    // Alle Ordner durchgehen
    var ordner = Object.keys(ORDNER_NAMEN);
    var totalFiles = 0;
    var doneFiles = 0;

    // Zuerst alle Dateilisten laden
    var allFiles = [];
    for(var i = 0; i < ordner.length; i++){
      var ord = ordner[i];
      try {
        var listRes = await fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET), {
          method: 'POST',
          headers: {...sh(), 'Content-Type': 'application/json'},
          body: JSON.stringify({prefix: ord+'/', limit: 500, sortBy:{column:'name',order:'asc'}})
        });
        var files = await listRes.json();
        if(Array.isArray(files)){
          files.filter(function(f){ return f.name && f.id; }).forEach(function(f){
            allFiles.push({ ordner: ord, name: f.name, path: ord+'/'+f.name });
          });
        }
      } catch(e){}
    }

    totalFiles = allFiles.length;
    if(!totalFiles){
      alert('Keine Dateien gefunden.');
      btn.disabled = false;
      btn.textContent = '💾 Backup erstellen';
      return;
    }

    btn.textContent = '⏳ 0/'+totalFiles+' Dateien...';

    // Dateien herunterladen und in ZIP packen
    for(var j = 0; j < allFiles.length; j++){
      var file = allFiles[j];
      try {
        // Direkt via authenticated fetch herunterladen
        var encodedPath = file.path.split('/').map(function(p){ return encodeURIComponent(p); }).join('/');
        var fileRes = await fetch(SUPA_ST+'/object/authenticated/'+encodeURIComponent(BUCKET)+'/'+encodedPath, {
          headers: sh()
        });
        var blob = await fileRes.blob();
        var arrayBuf = await blob.arrayBuffer();

        // Ordnerstruktur: Ordnername / Kundennummer_Kundenname / Dateiname
        var ordnerName = ORDNER_NAMEN[file.ordner] || file.ordner;
        var fileName = file.name;

        // Kundennummer aus Dateiname extrahieren
        var nameParts = fileName.split('_');
        var subFolder = '';
        if(nameParts.length > 1 && /^\d+$/.test(nameParts[0])){
          var kundeNr = nameParts[0];
          var kunde = allKunden.find(function(k){ return String(k.nr) === kundeNr; });
          var kundeName = kunde ? (kunde.company||(kunde.firstName+' '+kunde.lastName).trim()||kunde.name) : kundeNr;
          // Sonderzeichen entfernen für Ordnernamen
          subFolder = kundeNr+'_'+kundeName.replace(/[\/\\:*?"<>|]/g,'_');
        }

        var zipPath = subFolder
          ? ordnerName+'/'+subFolder+'/'+fileName
          : ordnerName+'/'+fileName;

        rootFolder.file(zipPath, arrayBuf);
        doneFiles++;
        btn.textContent = '⏳ '+doneFiles+'/'+totalFiles+' Dateien...';

      } catch(e){ console.log('Fehler bei', file.path, e); }
    }

    // ZIP generieren und herunterladen
    btn.textContent = '⏳ ZIP wird erstellt...';
    var zipBlob = await zip.generateAsync({type:'blob', compression:'DEFLATE', compressionOptions:{level:6}});
    var zipUrl = URL.createObjectURL(zipBlob);
    var a = document.createElement('a');
    a.href = zipUrl;
    a.download = 'BD_Archiv_Backup_'+datum+'.zip';
    a.click();
    URL.revokeObjectURL(zipUrl);

    btn.textContent = '✅ Backup fertig! ('+doneFiles+' Dateien)';
    btn.style.background = 'linear-gradient(135deg,rgba(34,197,94,.35),rgba(16,185,129,.25))';
    setTimeout(function(){
      btn.textContent = '💾 Backup erstellen';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);

  } catch(err){
    alert('Backup Fehler: '+err.message);
    btn.disabled = false;
    btn.textContent = '💾 Backup erstellen';
  }
}
