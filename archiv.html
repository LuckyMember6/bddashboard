<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B+D Archiv</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="B+D Archiv">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
<style>
:root{
  --navy:#1B2F6E;--blue:#3B82F6;--blue-glow:rgba(59,130,246,.45);
  --green:#22C55E;--red:#EF4444;--amber:#F59E0B;
  --glass:rgba(255,255,255,.06);--glass-brd:rgba(255,255,255,.14);
  --text:#F5F7FF;--muted:#A9B4D6;--hint:#7886B8;
  --radius:16px;--radius-sm:10px;
  --font:'Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif;
  --border:var(--glass-brd);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;
  background:radial-gradient(circle at 15% 0%,rgba(59,130,246,.25),transparent 40%),
    radial-gradient(circle at 85% 30%,rgba(99,102,241,.18),transparent 45%),
    linear-gradient(155deg,#0B1430 0%,#16235A 45%,#0E1A45 100%);
  background-attachment:fixed;
}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2rem;border-bottom:1px solid var(--glass-brd);
  background:rgba(10,18,46,.4);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:20;
}
.header-title{font-size:20px;font-weight:800;color:#fff;}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.back-btn{background:rgba(255,255,255,.08);border:1px solid var(--glass-brd);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font);text-decoration:none;}
.back-btn:hover{color:#fff;}
.main{padding:1.5rem 2rem;max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;}
.card{background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius);padding:1.5rem;backdrop-filter:blur(14px);box-shadow:0 8px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.06);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tabs{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:12px;padding:4px;}
.tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;border:none;background:transparent;font-family:var(--font);}
.tab.active{background:rgba(59,130,246,.25);color:#fff;box-shadow:0 0 12px var(--blue-glow);}

/* UPLOAD ZONE */
.upload-zone{
  border:2px dashed var(--glass-brd);border-radius:var(--radius);
  padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;
  background:rgba(255,255,255,.02);position:relative;
}
.upload-zone:hover,.upload-zone.drag-over{border-color:rgba(96,165,250,.7);background:rgba(59,130,246,.08);}
.upload-zone-icon{font-size:48px;margin-bottom:12px;}
.upload-zone-text{font-size:16px;font-weight:600;color:var(--muted);}
.upload-zone-sub{font-size:12px;color:var(--hint);margin-top:6px;}
.camera-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.camera-btn{padding:11px;border:1px dashed var(--border);border-radius:10px;background:rgba(255,255,255,.03);color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.camera-btn:hover{border-color:rgba(96,165,250,.4);color:#fff;}

/* ANALYSE */
.analyse-card{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(99,102,241,.08));border:1px solid rgba(96,165,250,.3);border-radius:var(--radius);padding:1.5rem;display:none;}
.analyse-loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.preview-img{max-width:100%;max-height:200px;border-radius:10px;border:1px solid var(--glass-brd);margin-bottom:1rem;}
.preview-pdf{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid var(--glass-brd);margin-bottom:1rem;}

/* FORM */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;font-size:14px;outline:none;font-family:var(--font);}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.field select option{background:#1B2F6E;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}

/* AUTOCOMPLETE */
.autocomplete-wrap{position:relative;}
.autocomplete-results{
  position:absolute;top:100%;left:0;right:0;z-index:50;
  background:linear-gradient(160deg,rgba(20,35,85,.98),rgba(10,20,60,.99));
  border:1px solid var(--glass-brd);border-radius:10px;margin-top:3px;
  max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.autocomplete-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06);}
.autocomplete-item:hover{background:rgba(59,130,246,.15);}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item-name{font-weight:600;color:#fff;}
.autocomplete-item-sub{font-size:11px;color:var(--hint);margin-top:1px;}

/* ORDNER BADGE */
.ordner-vorschlag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px;}
.ordner-badge-angebote{background:rgba(59,130,246,.2);border:1px solid rgba(96,165,250,.4);color:#93c5fd;}
.ordner-badge-auftragsbestaetigung{background:rgba(99,102,241,.2);border:1px solid rgba(139,92,246,.4);color:#c4b5fd;}
.ordner-badge-lieferscheine{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.ordner-badge-rechnungen-debi{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fcd34d;}
.ordner-badge-rechnungen-kredi{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.ordner-badge-ab-lieferanten{background:rgba(107,114,128,.2);border:1px solid rgba(107,114,128,.4);color:#d1d5db;}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:rgba(255,255,255,.07);border:1px solid var(--glass-brd);border-radius:var(--radius-sm);padding:11px 20px;font-size:14px;color:var(--muted);cursor:pointer;font-family:var(--font);}
.btn-secondary:hover{color:#fff;}
.btn-sm{background:rgba(255,255,255,.07);border:1px solid var(--glass-brd);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--font);}
.btn-sm:hover{color:#fff;}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5;}

/* STATUS */
.status-msg{font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);}
.status-ok{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.status-err{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}

/* DATEI LISTE */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filter-bar select,.filter-bar input{padding:9px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.07);color:var(--text);font-size:13px;outline:none;font-family:var(--font);}
.filter-bar select option{background:#1B2F6E;}
.datei-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:1rem;}
.datei-card{background:rgba(255,255,255,.04);border:1px solid var(--glass-brd);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;transition:all .18s;}
.datei-card:hover{background:rgba(255,255,255,.07);border-color:rgba(96,165,250,.3);}
.datei-name{font-size:13px;font-weight:600;color:#fff;word-break:break-all;line-height:1.4;}
.datei-meta{font-size:11px;color:var(--hint);}
.datei-actions{display:flex;gap:6px;flex-wrap:wrap;}
.empty{text-align:center;padding:3rem 1rem;color:var(--hint);font-size:13px;}
.empty-icon{font-size:40px;margin-bottom:8px;}

/* PROGRESS */
.progress-bar{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#6366f1);border-radius:3px;transition:width .3s;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,10,28,.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:linear-gradient(160deg,rgba(30,45,95,.97),rgba(15,25,65,.99));border:1px solid var(--glass-brd);border-radius:var(--radius);padding:1.75rem;width:520px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal h3{font-size:18px;font-weight:800;color:#fff;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:10px;margin-top:1.25rem;justify-content:flex-end;}

@media(max-width:768px){.main{padding:1rem;}.header{padding:.75rem 1rem;}}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="back-btn">← Dashboard</a>
    <div>
      <div class="header-title">🗂 B+D Archiv</div>
      <div class="header-sub">Intelligente Dokumentenverwaltung</div>
    </div>
  </div>
</div>

<main class="main">

  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('upload')">📤 Hochladen</button>
      <button class="tab" onclick="switchTab('archiv')">📁 Archiv</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="doBackup()" id="backupBtn"
        style="background:linear-gradient(135deg,rgba(34,197,94,.25),rgba(16,185,129,.15));border:1px solid rgba(34,197,94,.4);border-radius:var(--radius-sm);padding:9px 18px;font-size:13px;font-weight:700;color:#86efac;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px;">
        💾 Backup erstellen
      </button>
      <div id="globalStatus"></div>
    </div>
  </div>

  <!-- TAB: UPLOAD + CLAUDE ANALYSE -->
  <div id="tab-upload">

    <!-- DROPZONE -->
    <div class="card">
      <div class="upload-zone" id="uploadZone"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleDrop(event)"
        onclick="document.getElementById('fileInput').click()">
        <div class="upload-zone-icon">🤖</div>
        <div class="upload-zone-text">Datei hierher ziehen oder klicken</div>
        <div class="upload-zone-sub">Claude analysiert automatisch: Ordner, Kunde, Metadaten</div>
      </div>
      <div class="camera-btns">
        <div class="camera-btn" onclick="document.getElementById('cameraInput').click()">📷 Kamera</div>
        <div class="camera-btn" onclick="document.getElementById('galleryInput').click()">🖼 Galerie</div>
      </div>
      <input type="file" id="fileInput" style="display:none" onchange="handleFiles(this.files)">
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
      <input type="file" id="galleryInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    </div>

    <!-- ANALYSE RESULT -->
    <div class="analyse-card" id="analyseCard">
      <div class="analyse-loading" id="analyseLoading">
        <div class="spinner"></div>
        <span>Claude analysiert die Datei...</span>
      </div>

      <div id="analyseResult" style="display:none;">
        <!-- Vorschau -->
        <div id="filePreview"></div>

        <!-- Ordner Vorschlag -->
        <div style="margin-bottom:1rem;">
          <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Claude empfiehlt</div>
          <div id="ordnerVorschlag"></div>
        </div>

        <!-- FELDER -->
        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Ordner *</label>
            <select id="fOrdner">
              <option value="angebote">📄 Angebote</option>
              <option value="auftragsbestaetigung">📋 Auftragsbestätigungen</option>
              <option value="lieferscheine">🚛 Lieferscheine signiert</option>
              <option value="rechnungen-debi">🧾 Rechnungen Debi</option>
              <option value="rechnungen-kredi">🧾 Rechnungen Kredi</option>
              <option value="ab-lieferanten">📦 AB Lieferanten</option>
            </select>
          </div>
          <div class="field">
            <label>Dateiname *</label>
            <input id="fName" type="text" placeholder="z.B. 2026-06-17_Rechnung_Lieferant.pdf">
          </div>
        </div>

        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Kunde / Lieferant</label>
            <div class="autocomplete-wrap">
              <input id="fKundeSearch" type="text" placeholder="Name oder Nr. suchen..." oninput="searchKunde(this.value)" autocomplete="off">
              <div class="autocomplete-results" id="kundeResults"></div>
            </div>
            <input type="hidden" id="fKundeNr">
          </div>
          <div class="field">
            <label>Datum</label>
            <input id="fDatum" type="date">
          </div>
        </div>

        <div class="form-grid" style="margin-bottom:1rem;">
          <div class="field">
            <label>Betrag CHF</label>
            <input id="fBetrag" type="number" step="0.01" placeholder="0.00">
          </div>
          <div class="field">
            <label>Referenz / Nr.</label>
            <input id="fReferenz" type="text" placeholder="z.B. Rechnungsnummer">
          </div>
        </div>

        <div class="field" style="margin-bottom:1.5rem;">
          <label>Beschreibung / Notiz</label>
          <textarea id="fBeschreibung" rows="3" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;font-size:13px;outline:none;font-family:var(--font);resize:vertical;"></textarea>
        </div>

        <div id="uploadActionStatus" style="display:none;" class="status-msg" style="margin-bottom:1rem;"></div>
        <div id="uploadProgress" style="display:none;margin-bottom:1rem;">
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <div style="font-size:12px;color:var(--hint);margin-top:4px;" id="progressText">Hochladen...</div>
        </div>

        <div style="display:flex;gap:10px;">
          <button class="btn-primary" onclick="doUpload()">📤 Jetzt hochladen & archivieren</button>
          <button class="btn-secondary" onclick="resetUpload()">✕ Abbrechen</button>
        </div>
      </div>
    </div>

  </div>

  <!-- TAB: ARCHIV -->
  <div id="tab-archiv" style="display:none;">
    <div class="card">
      <div class="filter-bar">
        <select id="filterOrdner" onchange="loadDateien()" style="min-width:200px;">
          <option value="">Alle Ordner</option>
          <option value="angebote">📄 Angebote</option>
          <option value="auftragsbestaetigung">📋 Auftragsbestätigungen</option>
          <option value="lieferscheine">🚛 Lieferscheine signiert</option>
          <option value="rechnungen-debi">🧾 Rechnungen Debi</option>
          <option value="rechnungen-kredi">🧾 Rechnungen Kredi</option>
          <option value="ab-lieferanten">📦 AB Lieferanten</option>
        </select>
        <input id="filterSuche" type="text" placeholder="🔍 Dateiname suchen..." oninput="renderDateiGrid()" style="flex:1;min-width:180px;">
        <button class="btn-sm" onclick="loadDateien()">↻</button>
      </div>
      <div id="dateiGrid"><div class="empty"><div class="empty-icon">📂</div>Wähle einen Ordner oder lade eine Datei hoch.</div></div>
    </div>
  </div>

</main>

<!-- EDIT MODAL -->
<div class="overlay" id="editModal">
  <div class="modal">
    <h3>Datei bearbeiten</h3>
    <div class="field"><label>Dateiname</label><input id="editName" type="text"></div>
    <div class="field">
      <label>Ordner</label>
      <select id="editOrdner">
        <option value="angebote">📄 Angebote</option>
        <option value="auftragsbestaetigung">📋 Auftragsbestätigungen</option>
        <option value="lieferscheine">🚛 Lieferscheine signiert</option>
        <option value="rechnungen-debi">🧾 Rechnungen Debi</option>
        <option value="rechnungen-kredi">🧾 Rechnungen Kredi</option>
        <option value="ab-lieferanten">📦 AB Lieferanten</option>
      </select>
    </div>
    <div class="field">
      <label>Kunde / Lieferant</label>
      <div class="autocomplete-wrap">
        <input id="editKundeSearch" type="text" placeholder="Name oder Nr. suchen..." oninput="searchKundeEdit(this.value)" autocomplete="off">
        <div class="autocomplete-results" id="editKundeResults"></div>
      </div>
      <input type="hidden" id="editKundeNr">
    </div>
    <div id="editModalStatus" style="display:none;" class="status-msg"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeEditModal()">Abbrechen</button>
      <button class="btn-primary" style="padding:10px 22px;font-size:14px;" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script>
var SUPA_URL='https://osxrgginjkzonvyyndpi.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeHJnZ2luamt6b252eXluZHBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDExMjksImV4cCI6MjA5Njc3NzEyOX0.X-Ftee85CqLG0jvYVaUA1oYPr-v5svmguZuUNJAHnWo';
var CC_FN='https://osxrgginjkzonvyyndpi.supabase.co/functions/v1/cashctrl';
var BUCKET='Dashboard BD';
var SUPA_ST=SUPA_URL+'/storage/v1';

var allKunden=[];
var allDateien=[];
var currentFile=null;
var currentEditFile=null;

function sh(){ return {'Authorization':'Bearer '+SUPA_KEY,'apikey':SUPA_KEY}; }
function bp(path){ return SUPA_ST+'/object/'+encodeURIComponent(BUCKET)+'/'+path; }

// ── TABS
function switchTab(t){
  document.getElementById('tab-upload').style.display=t==='upload'?'':'none';
  document.getElementById('tab-archiv').style.display=t==='archiv'?'':'none';
  document.querySelectorAll('.tab').forEach(function(b,i){ b.classList.toggle('active',(i===0&&t==='upload')||(i===1&&t==='archiv')); });
  if(t==='archiv') loadDateien();
}

// ── KUNDEN
function loadKunden(){
  fetch(CC_FN+'?action=persons')
    .then(function(r){ return r.json(); })
    .then(function(res){
      allKunden=(res.data||[]).sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','de'); });
    }).catch(function(){});
}

function searchKunde(q, resultsId, hiddenId){
  resultsId=resultsId||'kundeResults'; hiddenId=hiddenId||'fKundeNr';
  var el=document.getElementById(resultsId);
  if(!q||q.length<2){ el.style.display='none'; return; }
  var lq=q.toLowerCase();
  var hits=allKunden.filter(function(k){
    var name=k.company||(k.firstName+' '+k.lastName).trim()||k.name;
    return (name+String(k.nr||'')+k.city).toLowerCase().includes(lq);
  }).slice(0,8);
  if(!hits.length){ el.style.display='none'; return; }
  el.innerHTML=hits.map(function(k){
    var name=k.company||(k.firstName+' '+k.lastName).trim()||k.name;
    return '<div class="autocomplete-item" onclick="selectKunde(\''+k.nr+'\',\''+name.replace(/'/g,'')+'\',\''+resultsId+'\',\''+hiddenId+'\')">'
      +'<div class="autocomplete-item-name">'+name+'</div>'
      +'<div class="autocomplete-item-sub">Nr. '+k.nr+(k.city?' · '+k.city:'')+'</div>'
    +'</div>';
  }).join('');
  el.style.display='block';
}
function searchKundeEdit(q){ searchKunde(q,'editKundeResults','editKundeNr'); }

function selectKunde(nr, name, resultsId, hiddenId){

function analyseFile(file){
  currentFile=file;
  var card=document.getElementById('analyseCard');
  card.style.display='block';
  document.getElementById('analyseLoading').style.display='flex';
  document.getElementById('analyseResult').style.display='none';
  document.getElementById('uploadActionStatus').style.display='none';

  // Vorschau
  var prevEl=document.getElementById('filePreview');
  var ext=file.name.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext)){
    var url=URL.createObjectURL(file);
    prevEl.innerHTML='<img src="'+url+'" class="preview-img">';
  } else {
    var icon=ext==='pdf'?'📄':ext==='xlsx'||ext==='xls'?'📊':ext==='docx'?'📝':'📎';
    prevEl.innerHTML='<div class="preview-pdf"><span style="font-size:32px;">'+icon+'</span><div><div style="font-weight:600;font-size:14px;">'+file.name+'</div><div style="font-size:12px;color:var(--hint);">'+(file.size>1048576?(file.size/1048576).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB')+'</div></div></div>';
  }

  // Vorausfüllen mit Dateiname
  document.getElementById('fName').value=file.name;
  document.getElementById('fDatum').value=new Date().toISOString().split('T')[0];

  // Claude Analyse
  if(['jpg','jpeg','png','gif','webp'].includes(ext)){
    var reader=new FileReader();
    reader.onload=function(e){
      var base64=e.target.result.split(',')[1];
      claudeAnalyse(base64, file.type||'image/jpeg', file.name);
    };
    reader.readAsDataURL(file);
  } else if(ext === 'pdf'){
    // PDF erste Seite → Canvas → JPEG → Claude Vision
    var pdfUrl = URL.createObjectURL(file);
    renderPdfToJpeg(pdfUrl, file.name);
  } else {
    claudeAnalyseText(file.name);
  }
}

function renderPdfToJpeg(pdfUrl, fileName){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf){
    return pdf.getPage(1);
  }).then(function(page){
    var scale = 1.5;
    var viewport = page.getViewport({scale: scale});
    var canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    return page.render({canvasContext: ctx, viewport: viewport}).promise.then(function(){
      var jpegDataUrl = canvas.toDataURL('image/jpeg', 0.85);
      var jpegBase64 = jpegDataUrl.split(',')[1];
      // Vorschau zeigen
      document.getElementById('filePreview').innerHTML = '<img src="'+jpegDataUrl+'" class="preview-img">';
      claudeAnalyse(jpegBase64, 'image/jpeg', fileName);
    });
  }).catch(function(){
    claudeAnalyseText(fileName);
  });
}

function doUpload(){
  if(!currentFile){ alert('Keine Datei ausgewählt.'); return; }
  var ordner=document.getElementById('fOrdner').value;
  var name=document.getElementById('fName').value.trim();
  var kundeNr=document.getElementById('fKundeNr').value.trim();
  if(!name){ alert('Bitte einen Dateinamen eingeben.'); return; }

  // Kundennummer als Prefix falls vorhanden

  statusEl.style.display='none';
  prog.style.display='block';
  document.getElementById('progressFill').style.width='30%';

  fetch(bp(path),{
    method:'POST',
    headers:{...sh(),'Content-Type':currentFile.type||'application/octet-stream','x-upsert':'true'},
    body:currentFile

  .then(function(r){
    document.getElementById('progressFill').style.width='100%';

    if(!r.ok) throw new Error('Upload fehlgeschlagen ('+r.status+')');
    return r.json();
  })
  .then(function(){
    prog.style.display='none';
    statusEl.style.display='block';
    statusEl.className='status-msg status-ok';
    statusEl.textContent='✅ "'+fileName+'" erfolgreich in "'+ORDNER_LABELS[ordner]+'" archiviert!';

  .catch(function(err){
    prog.style.display='none';
    statusEl.style.display='block';
    statusEl.className='status-msg status-err';
    statusEl.textContent='❌ '+err.message;

function loadDateien(){
  var ordner=document.getElementById('filterOrdner').value;
  var el=document.getElementById('dateiGrid');
  el.innerHTML='<div class="empty"><div class="empty-icon">⏳</div>Lade Dateien...</div>';

  fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET),{
    method:'POST',
    headers:{...sh(),'Content-Type':'application/json'},
    body:JSON.stringify({prefix:ordner?ordner+'/':'',limit:500,sortBy:{column:'created_at',order:'desc'}})
  })
  .then(function(r){ return r.json(); })
  .then(function(files){
    allDateien=(files||[]).filter(function(f){ return f.name&&f.id; }).map(function(f){
      var prefix=ordner?ordner+'/':'';
      var fullPath=prefix+f.name;
      var parts=fullPath.split('/');
      return {path:fullPath,folder:parts[0],name:parts.slice(1).join('/')||f.name,rawName:f.name,size:f.metadata?.size||0,created_at:f.created_at};
    });
    renderDateiGrid();
  })
  .catch(function(err){ el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div>Fehler: '+err.message+'</div>'; });
}

function renderDateiGrid(){
  var el=document.getElementById('dateiGrid');
  var q=document.getElementById('filterSuche').value.toLowerCase();
  var list=allDateien.filter(function(f){ return !q||f.name.toLowerCase().includes(q); });
  if(!list.length){ el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Keine Dateien gefunden.</div>'; return; }

  var FICONS={angebote:'📄',auftragsbestaetigung:'📋',lieferscheine:'🚛','rechnungen-debi':'🧾','rechnungen-kredi':'🧾','ab-lieferanten':'📦'};
  el.innerHTML='<div class="datei-grid">'+list.map(function(f){
    var ext=(f.name||'').split('.').pop().toLowerCase();
    var icon=ext==='pdf'?'📄':ext==='xlsx'||ext==='xls'?'📊':ext==='docx'?'📝':['jpg','jpeg','png'].includes(ext)?'🖼':'📎';
    var size=f.size?(f.size>1048576?(f.size/1048576).toFixed(1)+'MB':(f.size/1024).toFixed(0)+'KB'):'';
    var date=f.created_at?new Date(f.created_at).toLocaleDateString('de-CH'):'';
    var fi=FICONS[f.folder]||'📁';
    // Kundennummer aus Name extrahieren
    var nameParts=f.rawName.split('_');
    var kundeInfo='';
    if(nameParts.length>1&&/^\d+$/.test(nameParts[0])){
      var k=allKunden.find(function(x){ return String(x.nr)===nameParts[0]; });
      var kname=k?(k.company||(k.firstName+' '+k.lastName).trim()||k.name):'';
      kundeInfo='<div style="font-size:10px;color:rgba(96,165,250,.8);margin-top:2px;">👤 '+nameParts[0]+(kname?' – '+kname:'')+'</div>';
    }
    return '<div class="datei-card">'
      +'<div style="display:flex;align-items:flex-start;gap:10px;">'
        +'<div style="font-size:26px;flex-shrink:0;">'+icon+'</div>'
        +'<div style="flex:1;min-width:0;">'
          +'<div class="datei-name">'+f.name+'</div>'
          +'<div class="datei-meta">'+fi+' '+(f.folder||'')+(size?' · '+size:'')+(date?' · '+date:'')+'</div>'
          +kundeInfo
        +'</div>'
      +'</div>'
      +'<div class="datei-actions">'
        +'<button class="btn-sm" style="color:#93c5fd;border-color:rgba(96,165,250,.3);" onclick="downloadDatei(\''+f.path+'\',\''+f.rawName+'\')">⬇ Download</button>'
        +'<button class="btn-sm" onclick="openEditModal(\''+f.path+'\',\''+f.rawName+'\',\''+f.folder+'\')">✏ Bearbeiten</button>'
        +'<button class="btn-sm btn-danger" onclick="deleteDatei(\''+f.path+'\')">🗑</button>'
      +'</div>'
    +'</div>';
  }).join('')+'</div>';
}

function downloadDatei(path,name){
  fetch(SUPA_ST+'/object/sign/'+encodeURIComponent(BUCKET)+'/'+path,{
    method:'POST',headers:{...sh(),'Content-Type':'application/json'},
    body:JSON.stringify({expiresIn:60})
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var url=data.signedURL||data.signedUrl;
    if(!url) throw new Error(JSON.stringify(data));
    if(!url.startsWith('http')) url=SUPA_URL+url;
    var a=document.createElement('a'); a.href=url; a.download=name; a.target='_blank'; a.click();
  })
  .catch(function(err){ alert('Download Fehler: '+err.message); });
}

function deleteDatei(path){
  if(!confirm('Datei endgültig löschen?')) return;
  fetch(bp(path),{method:'DELETE',headers:sh()})
    .then(function(){ loadDateien(); })
    .catch(function(err){ alert('Fehler: '+err.message); });
}

// ── BACKUP ───────────────────────────────────────────────────────
async function doBackup(){
  var btn = document.getElementById('backupBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Backup läuft...';

  var ORDNER_NAMEN = {
    'angebote': 'Angebote',
    'auftragsbestaetigung': 'Auftragsbestaetigung',
    'lieferscheine': 'Lieferscheine_signiert',
    'rechnungen-debi': 'Rechnungen_Debi',
    'rechnungen-kredi': 'Rechnungen_Kredi',
    'ab-lieferanten': 'AB_Lieferanten'
  };

  try {
    var zip = new JSZip();
    var datum = new Date().toISOString().split('T')[0];
    var rootFolder = zip.folder('BD_Archiv_Backup_'+datum);

    // Alle Ordner durchgehen
    var ordner = Object.keys(ORDNER_NAMEN);
    var totalFiles = 0;
    var doneFiles = 0;

    // Zuerst alle Dateilisten laden
    var allFiles = [];
    for(var i = 0; i < ordner.length; i++){
      var ord = ordner[i];
      try {
        var listRes = await fetch(SUPA_ST+'/object/list/'+encodeURIComponent(BUCKET), {
          method: 'POST',
          headers: {...sh(), 'Content-Type': 'application/json'},
          body: JSON.stringify({prefix: ord+'/', limit: 500, sortBy:{column:'name',order:'asc'}})
        });
        var files = await listRes.json();
        if(Array.isArray(files)){
          files.filter(function(f){ return f.name && f.id; }).forEach(function(f){
            allFiles.push({ ordner: ord, name: f.name, path: ord+'/'+f.name });
          });
        }
      } catch(e){}
    }

    totalFiles = allFiles.length;
    if(!totalFiles){
      alert('Keine Dateien gefunden.');
      btn.disabled = false;
      btn.textContent = '💾 Backup erstellen';
      return;
    }

    btn.textContent = '⏳ 0/'+totalFiles+' Dateien...';

    // Dateien herunterladen und in ZIP packen
    for(var j = 0; j < allFiles.length; j++){
      var file = allFiles[j];
      try {
        // Signed URL holen
        var signRes = await fetch(SUPA_ST+'/object/sign/'+encodeURIComponent(BUCKET)+'/'+file.path, {
          method: 'POST',
          headers: {...sh(), 'Content-Type': 'application/json'},
          body: JSON.stringify({expiresIn: 300})
        });
        var signData = await signRes.json();
        var url = signData.signedURL || signData.signedUrl;
        if(!url) continue;
        if(!url.startsWith('http')) url = SUPA_URL + url;

        // Datei herunterladen
        var fileRes = await fetch(url);
        var blob = await fileRes.blob();
        var arrayBuf = await blob.arrayBuffer();

        // Ordnerstruktur: Ordnername / Kundennummer_Kundenname / Dateiname
        var ordnerName = ORDNER_NAMEN[file.ordner] || file.ordner;
        var fileName = file.name;

        // Kundennummer aus Dateiname extrahieren
        var nameParts = fileName.split('_');
        var subFolder = '';
        if(nameParts.length > 1 && /^\d+$/.test(nameParts[0])){
          var kundeNr = nameParts[0];
          var kunde = allKunden.find(function(k){ return String(k.nr) === kundeNr; });
          var kundeName = kunde ? (kunde.company||(kunde.firstName+' '+kunde.lastName).trim()||kunde.name) : kundeNr;
          // Sonderzeichen entfernen für Ordnernamen
          subFolder = kundeNr+'_'+kundeName.replace(/[\/\\:*?"<>|]/g,'_');
        }

        var zipPath = subFolder
          ? ordnerName+'/'+subFolder+'/'+fileName
          : ordnerName+'/'+fileName;

        rootFolder.file(zipPath, arrayBuf);
        doneFiles++;
        btn.textContent = '⏳ '+doneFiles+'/'+totalFiles+' Dateien...';

      } catch(e){ console.log('Fehler bei', file.path, e); }
    }

    // ZIP generieren und herunterladen
    btn.textContent = '⏳ ZIP wird erstellt...';
    var zipBlob = await zip.generateAsync({type:'blob', compression:'DEFLATE', compressionOptions:{level:6}});
    var zipUrl = URL.createObjectURL(zipBlob);
    var a = document.createElement('a');
    a.href = zipUrl;
    a.download = 'BD_Archiv_Backup_'+datum+'.zip';
    a.click();
    URL.revokeObjectURL(zipUrl);

    btn.textContent = '✅ Backup fertig! ('+doneFiles+' Dateien)';
    btn.style.background = 'linear-gradient(135deg,rgba(34,197,94,.35),rgba(16,185,129,.25))';
    setTimeout(function(){
      btn.textContent = '💾 Backup erstellen';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);

  } catch(err){
    alert('Backup Fehler: '+err.message);
    btn.disabled = false;
    btn.textContent = '💾 Backup erstellen';
  }
}
</script>
</body>
</html>
